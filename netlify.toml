[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."oss-upload"]
  maxDuration = 30

[[redirects]]
  from = "/api/oss-upload"
  to = "/.netlify/functions/oss-upload"
  status = 200

[[redirects]]
  from = "/api/image-proxy"
  to = "/.netlify/functions/image-proxy"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
